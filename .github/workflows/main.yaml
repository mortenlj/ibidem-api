name: ibidem-api

on:
  push:
  workflow_dispatch:

env:
  main_image: ghcr.io/${{ github.repository }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  setup:
    uses: mortenlj/mise-lib/.github/workflows/setup.yaml@main

  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      packages: write
      checks: write
      pull-requests: write
    needs: setup
    steps:
      - uses: jdx/mise-action@e79ddf65a11cec7b0e882bedced08d6e976efb2d # v3
      - name: Set up QEMU
        id: qemu
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3
        with:
          image: tonistiigi/binfmt:latest
          platforms: all
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: Login to GitHub Packages Docker Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          submodules: "true"
      - name: Build and possibly push docker image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: "."
          push: "${{ github.ref == 'refs/heads/main' }}"
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.main_image }}:${{ fromJSON(needs.setup.outputs.clean-version) }}
            ${{ env.main_image }}:latest
      - name: Assemble manifests
        run: mise run k8s:manifests "${{ env.main_image }}"
        env:
          MORTENLJ_MISE_LIB_CLEAN_VERSION: ${{ fromJSON(needs.setup.outputs.clean-version) }}
      - name: Save manifests for later deploy
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: manifests
          path: mise-output/deploy.yaml
  #      - name: Publish Test Results
  #        uses: EnricoMi/publish-unit-test-result-action@34d7c956a59aed1bfebf31df77b8de55db9bbaaf # v2
  #        if: always()
  #        with:
  #          files: |
  #            xunit.xml
  deploy:
    permissions:
      id-token: write # This is required for requesting the JWT
    needs:
      - setup
      - build
    uses: mortenlj/mise-lib/.github/workflows/deploy.yaml@main
    secrets:
      ZEROTIER_NETWORK_ID: ${{ secrets.ZEROTIER_NETWORK_ID }}
      ZEROTIER_API_ACCESSTOKEN: ${{ secrets.ZEROTIER_API_ACCESSTOKEN }}

  cleanup:
    permissions:
      packages: write
    needs: build
    uses: mortenlj/mise-lib/.github/workflows/cleanup.yaml@main
